name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: Pack & Verify packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core first
        run: npm run build:core

      - name: Build remaining packages
        run: |
          npm run build:angular
          npm run build:react
          npm run build:vue

      - name: npm pack (dry run)
        run: |
          for pkg in code-core code-angular code-react code-vue; do
            echo "=== Packing packages/$pkg ==="
            cd packages/$pkg
            npm pack --dry-run 2>&1 | head -40
            cd ../..
          done

      - name: Comment on PR with pack summary
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All packages built and packed successfully. Ready for review!'
            })
