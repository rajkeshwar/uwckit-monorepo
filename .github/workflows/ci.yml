name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core (required for type resolution)
        run: npm run build:core

      - name: Type check (core)
        run: npx tsc -p packages/code-core/tsconfig.json --noEmit

      - name: Type check (vue)
        run: npx vue-tsc -p tsconfig.json --noEmit
        working-directory: packages/code-vue

      - name: Type check (react)
        run: npx tsc -p packages/code-react/tsconfig.json --noEmit

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core first
        run: npm run build:core

      - name: Build remaining packages
        run: |
          npm run build:angular
          npm run build:react
          npm run build:vue

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: |
            packages/code-core/dist
            packages/code-angular/dist
            packages/code-react/dist
            packages/code-vue/dist
          retention-days: 7

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --workspaces --if-present
